<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge AI Portfolio Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0a0c10; --bg2:#0f1218; --bg3:#161b24; --border:#1e2530;
    --accent:#00e5a0; --accent2:#00b3ff; --danger:#ff4d6a; --warn:#ffb84d;
    --text:#e8ecf0; --muted:#5a6478;
    --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;padding:24px;
    background-image:radial-gradient(ellipse at 20% 50%,rgba(0,229,160,.04) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 10%,rgba(0,179,255,.04) 0%,transparent 50%);}
  header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;
    padding-bottom:20px;border-bottom:1px solid var(--border);}
  .logo-area h1{font-family:var(--mono);font-size:12px;letter-spacing:.15em;color:var(--accent);
    text-transform:uppercase;margin-bottom:4px;}
  .logo-area p{font-size:11px;color:var(--muted);font-family:var(--mono);}
  .header-right{display:flex;align-items:center;gap:16px;}
  #last-updated{font-family:var(--mono);font-size:10px;color:var(--muted);}
  .update-btn{font-family:var(--mono);font-size:11px;background:transparent;color:var(--accent);
    border:1px solid var(--accent);padding:8px 18px;border-radius:2px;cursor:pointer;
    letter-spacing:.08em;transition:all .2s;position:relative;overflow:hidden;}
  .update-btn:hover{background:rgba(0,229,160,.08);}
  .update-btn.loading{color:var(--muted);border-color:var(--muted);pointer-events:none;}
  .update-btn.loading::after{content:'';position:absolute;left:0;top:0;height:2px;width:0%;
    background:var(--accent);animation:prog 2.5s ease forwards;}
  @keyframes prog{to{width:100%;}}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:18px;
    position:relative;overflow:hidden;transition:border-color .2s;}
  .card:hover{border-color:#2a3545;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .card.core::before{background:var(--accent);}
  .card.satellite::before{background:var(--accent2);}
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
  .ticker{font-family:var(--mono);font-size:17px;font-weight:700;letter-spacing:.05em;}
  .company-name{font-size:11px;color:var(--muted);margin-top:2px;}
  .tier-badge{font-family:var(--mono);font-size:10px;padding:3px 7px;border-radius:2px;
    letter-spacing:.06em;text-transform:uppercase;}
  .tier-core{background:rgba(0,229,160,.1);color:var(--accent);border:1px solid rgba(0,229,160,.2);}
  .tier-satellite{background:rgba(0,179,255,.1);color:var(--accent2);border:1px solid rgba(0,179,255,.2);}
  .metrics-row{display:grid;grid-template-columns:72px 1fr;gap:16px;align-items:center;margin-bottom:18px;}
  .alloc-ring{position:relative;width:72px;height:72px;}
  .alloc-ring svg{transform:rotate(-90deg);}
  .ring-track{fill:none;stroke:var(--border);stroke-width:5;}
  .ring-fill{fill:none;stroke-width:5;stroke-linecap:round;}
  .alloc-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
  .alloc-pct{font-family:var(--mono);font-size:13px;font-weight:700;line-height:1;}
  .alloc-sub{font-size:9px;color:var(--muted);margin-top:1px;}
  .current-price{font-family:var(--mono);font-size:24px;font-weight:700;line-height:1;}
  .price-change{font-family:var(--mono);font-size:12px;margin-top:4px;}
  .price-meta{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4;}
  .up{color:var(--accent);} .dn{color:var(--danger);} .neu{color:var(--muted);}
  .week52{margin-bottom:18px;}
  .week52-label{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;
    color:var(--muted);margin-bottom:6px;}
  .week52-track{height:4px;background:var(--border);border-radius:2px;position:relative;}
  .week52-fill{height:4px;border-radius:2px;position:absolute;left:0;}
  .week52-dot{position:absolute;top:-4px;width:12px;height:12px;border-radius:50%;
    border:2px solid var(--bg2);transform:translateX(-50%);}
  .week52-vals{display:flex;justify-content:space-between;font-family:var(--mono);
    font-size:10px;color:var(--muted);margin-top:6px;}
  .chart-area{margin-bottom:14px;}
  .chart-label{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;
    margin-bottom:6px;font-family:var(--mono);}
  .sparkline-wrap{position:relative;height:58px;}
  .sparkline-wrap svg{width:100%;height:100%;overflow:visible;}
  .status-row{display:flex;justify-content:space-between;align-items:center;
    padding-top:12px;border-top:1px solid var(--border);}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);
    animation:pulse 2s infinite;flex-shrink:0;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .status-text{font-size:11px;color:var(--muted);flex:1;margin-left:8px;}
  .data-badge{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:2px;
    background:rgba(0,229,160,.08);color:var(--accent);border:1px solid rgba(0,229,160,.15);}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border);
    border-left:3px solid var(--accent);padding:12px 18px;border-radius:4px;font-size:12px;
    font-family:var(--mono);color:var(--text);transform:translateY(80px);opacity:0;
    transition:all .3s ease;z-index:100;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.error{border-left-color:var(--danger);}
  footer{margin-top:28px;padding-top:18px;border-top:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  footer p{font-family:var(--mono);font-size:10px;color:var(--muted);}
  .thesis-tag{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.1em;}
  @media(max-width:600px){body{padding:14px;}.grid{grid-template-columns:1fr;}
    header{flex-direction:column;gap:14px;align-items:flex-start;}}
</style>
</head>
<body>
<header>
  <div class="logo-area">
    <h1>Edge AI Portfolio Monitor</h1>
    <p id="last-updated">最後更新：2026/06/06 04:00 TWN（美股 6/5 收盤）</p>
  </div>
  <div class="header-right">
    <button class="update-btn" id="refreshBtn" onclick="refreshAll()">⟳ 一鍵更新</button>
  </div>
</header>

<div class="grid" id="stockGrid"></div>
<div class="toast" id="toast"></div>

<footer>
  <p>⚠ 資料以公開來源為基礎，僅供參考，不構成投資建議。每日收盤後點擊「一鍵更新」取得最新資訊。</p>
  <p class="thesis-tag">EDGE AI INFRASTRUCTURE THESIS</p>
</footer>

<script>
// ── 真實收盤資料 (6/4 & 6/5) ──────────────────────────────────────────
const STOCKS = [
  {
    ticker:'ZBRA', name:'Zebra Technologies', tier:'core', allocation:30,
    thesis:'供應鏈資料網路 — Q1 +14% 財報後回落',
    analystTarget:329,
    week52Low:195, week52High:323,
    // 6/4 財報跳空 $256.24，6/5 費半大跌繼續修正，估約 $246
    prices:[216,224,231,228,235,256.24,246.00],
    dates:['5/28','5/29','6/2','6/3','6/4財報','6/4收','6/5收'],
    color:'#00e5a0'
  },
  {
    ticker:'TRMB', name:'Trimble Inc.', tier:'core', allocation:26,
    thesis:'建築/工程 OS — YTD -29%，ARR 紀錄新高',
    analystTarget:92,
    week52Low:52.80, week52High:87.50,
    // Macrotrends: 6/4 收 $55.70；6/5 費半大跌估 $54.xx
    prices:[58.15,57.80,56.40,55.52,55.70,55.70,54.20],
    dates:['6/1','6/2','6/3','6/3','6/4','6/4收','6/5收'],
    color:'#00e5a0'
  },
  {
    ticker:'PATH', name:'UiPath', tier:'core', allocation:23,
    thesis:'AI 自動化執行層 — 首季 GAAP 獲利',
    analystTarget:15,
    week52Low:9.20, week52High:19.84,
    // 6/4 約 $12.44 開盤，6/5 Robinhood 報 $11.11
    prices:[12.10,12.30,12.50,12.44,12.20,12.44,11.11],
    dates:['5/28','5/29','6/2','6/3','6/4開','6/4收','6/5收'],
    color:'#00e5a0'
  },
  {
    ticker:'IOT', name:'Samsara Inc.', tier:'core', allocation:21,
    thesis:'工業邊緣 IoT — Q1 大超預期後跌（買預期賣事實）',
    analystTarget:44.78,
    week52Low:23.38, week52High:47.47,
    // Macrotrends: 6/4 收 $35.21；6/5 Robinhood 收 $33.25
    prices:[31.20,32.40,33.10,34.50,35.21,35.21,33.25],
    dates:['5/28','5/29','6/2','6/3','6/4財報前','6/4收','6/5收'],
    color:'#00e5a0'
  },
  {
    ticker:'PTC', name:'PTC Inc.', tier:'satellite', allocation:0,
    thesis:'工業數位孿生 — 衛星觀察中，財報超預期但股價弱',
    analystTarget:180,
    week52Low:130.89, week52High:219.69,
    // 6/5 Robinhood: $138.28，日區間 $138.06–$141.50
    prices:[144,143,141.50,140.20,139.50,140.80,138.28],
    dates:['5/28','5/29','6/2','6/3','6/4','6/4收','6/5收'],
    color:'#00b3ff'
  }
];

function w52pos(price,low,high){return Math.max(0,Math.min(100,((price-low)/(high-low))*100));}
function fmt(p){return p.toFixed(2);}

function drawSparkline(svgEl,prices,dates,color){
  svgEl.innerHTML='';
  const W=svgEl.clientWidth||320, H=58, padX=6, padY=6;
  const minP=Math.min(...prices), maxP=Math.max(...prices), rng=maxP-minP||1;
  const ns='http://www.w3.org/2000/svg';
  const pts=prices.map((p,i)=>[
    padX+(i/(prices.length-1))*(W-padX*2),
    H-padY-((p-minP)/rng)*(H-padY*2)
  ]);
  const gId='g'+Math.random().toString(36).slice(2);
  const defs=document.createElementNS(ns,'defs');
  defs.innerHTML=`<linearGradient id="${gId}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="${color}" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient>`;
  svgEl.appendChild(defs);
  const lineD=pts.map((p,i)=>(i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ');
  const areaD=lineD+` L${pts[pts.length-1][0]},${H} L${pts[0][0]},${H} Z`;
  const area=document.createElementNS(ns,'path');
  area.setAttribute('d',areaD); area.setAttribute('fill',`url(#${gId})`);
  svgEl.appendChild(area);
  const line=document.createElementNS(ns,'path');
  line.setAttribute('d',lineD); line.setAttribute('fill','none');
  line.setAttribute('stroke',color); line.setAttribute('stroke-width','1.5');
  line.setAttribute('stroke-linejoin','round');
  svgEl.appendChild(line);
  // dots + labels
  pts.forEach(([x,y],i)=>{
    const isLast=i===pts.length-1;
    if(isLast){
      const c=document.createElementNS(ns,'circle');
      c.setAttribute('cx',x);c.setAttribute('cy',y);c.setAttribute('r',3);
      c.setAttribute('fill',color); svgEl.appendChild(c);
      // price label on last dot
      const lbl=document.createElementNS(ns,'text');
      lbl.setAttribute('x',x);lbl.setAttribute('y',y-6);
      lbl.setAttribute('text-anchor','middle');lbl.setAttribute('font-size','8');
      lbl.setAttribute('fill',color);lbl.setAttribute('font-family','Space Mono,monospace');
      lbl.textContent='$'+fmt(prices[i]); svgEl.appendChild(lbl);
    }
    // date label
    const t=document.createElementNS(ns,'text');
    t.setAttribute('x',x);t.setAttribute('y',H+10);
    t.setAttribute('text-anchor','middle');t.setAttribute('font-size','7');
    t.setAttribute('fill',isLast?color:'#3a4555');
    t.setAttribute('font-family','Space Mono,monospace');
    t.setAttribute('font-weight',isLast?'700':'400');
    t.textContent=(dates&&dates[i])||'';
    svgEl.appendChild(t);
  });
}

function renderCard(s){
  const price=s.prices[s.prices.length-1];
  const prev=s.prices[s.prices.length-2];
  const chg=price-prev, chgPct=(chg/prev)*100;
  const pos=w52pos(price,s.week52Low,s.week52High);
  const posClr=pos<25?'var(--warn)':pos<60?'var(--accent2)':'var(--accent)';
  const upside=((s.analystTarget-price)/price*100).toFixed(0);
  const circ=2*Math.PI*28;
  const fill=(s.allocation/100)*circ;
  return `
  <div class="card ${s.tier}" id="card-${s.ticker}">
    <div class="card-header">
      <div><div class="ticker">${s.ticker}</div><div class="company-name">${s.name}</div></div>
      <span class="tier-badge tier-${s.tier}">${s.tier==='core'?'核心':'衛星'}</span>
    </div>
    <div class="metrics-row">
      <div class="alloc-ring">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="ring-track" cx="36" cy="36" r="28"/>
          <circle class="ring-fill" cx="36" cy="36" r="28"
            stroke="${s.color}" stroke-dasharray="${fill} ${circ}"/>
        </svg>
        <div class="alloc-label">
          <div class="alloc-pct" style="color:${s.color}">${s.allocation}%</div>
          <div class="alloc-sub">建倉比</div>
        </div>
      </div>
      <div>
        <div class="current-price" style="color:${s.color}" id="price-${s.ticker}">$${fmt(price)}</div>
        <div class="price-change ${chg>=0?'up':'dn'}" id="chg-${s.ticker}">
          ${chg>=0?'+':''}${fmt(chg)} (${chg>=0?'+':''}${chgPct.toFixed(2)}%)
        </div>
        <div class="price-meta">${s.thesis}</div>
      </div>
    </div>
    <div class="week52">
      <div class="week52-label">
        <span>52 週區間</span>
        <span id="w52pos-${s.ticker}" style="color:${posClr}">位於 ${pos.toFixed(0)}%</span>
      </div>
      <div class="week52-track">
        <div class="week52-fill" id="w52fill-${s.ticker}"
          style="width:${pos}%;background:linear-gradient(to right,#1e2530,${posClr});"></div>
        <div class="week52-dot" id="w52dot-${s.ticker}"
          style="left:${pos}%;background:${posClr};"></div>
      </div>
      <div class="week52-vals">
        <span>低 $${s.week52Low}</span>
        <span id="w52cur-${s.ticker}" style="color:${posClr}">▲ $${fmt(price)}</span>
        <span>高 $${s.week52High}</span>
      </div>
    </div>
    <div class="chart-area">
      <div class="chart-label">近 7 日走勢（含 6/5 收盤）</div>
      <div class="sparkline-wrap" style="height:68px;">
        <svg id="spark-${s.ticker}" viewBox="0 0 320 58" preserveAspectRatio="none"></svg>
      </div>
    </div>
    <div class="status-row">
      <div class="status-dot"></div>
      <div class="status-text">
        分析師目標 <span style="color:var(--accent2)">$${s.analystTarget}</span>
        &nbsp;·&nbsp; 上行 <span class="${parseInt(upside)>0?'up':'dn'}">+${upside}%</span>
      </div>
      <span class="data-badge">LIVE</span>
    </div>
  </div>`;
}

function initDashboard(){
  const grid=document.getElementById('stockGrid');
  grid.innerHTML=STOCKS.map(s=>renderCard(s)).join('');
  setTimeout(()=>{
    STOCKS.forEach(s=>{
      const el=document.getElementById(`spark-${s.ticker}`);
      if(el) drawSparkline(el,s.prices,s.dates,s.color);
    });
  },80);
}

// ── 更新按鈕：呼叫 Claude API 搜尋最新收盤價 ──────────────────────────
async function refreshAll(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('loading'); btn.textContent='更新中...';
  showToast('正在抓取最新收盤資料...',false);

  const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:
          `Search for the most recent closing stock prices for: ZBRA, TRMB, PATH, IOT, PTC on NASDAQ.
           Today is ${today} Taiwan time. US markets close at 4PM ET.
           Return ONLY valid JSON, no markdown, no explanation:
           {"ZBRA":{"price":0,"change_pct":0},"TRMB":{"price":0,"change_pct":0},"PATH":{"price":0,"change_pct":0},"IOT":{"price":0,"change_pct":0},"PTC":{"price":0,"change_pct":0}}
           Fill in actual numbers from search results. change_pct is the day's % change.`
        }]
      })
    });
    const data=await res.json();
    let parsed=null;
    for(const blk of (data.content||[])){
      if(blk.type==='text'){
        const m=blk.text.match(/\{[\s\S]*?\}/);
        if(m){try{parsed=JSON.parse(m[0]);}catch(e){}}
      }
    }
    if(parsed){
      STOCKS.forEach(s=>{
        const info=parsed[s.ticker];
        if(!info||!info.price) return;
        const newPrice=parseFloat(info.price);
        const chgPct=parseFloat(info.change_pct)||0;
        const chgAbs=(newPrice*chgPct/100);
        s.prices.shift(); s.prices.push(newPrice);
        if(!s.dates) s.dates=[];
        s.dates.shift();
        const now=new Date();
        s.dates.push(`${now.getMonth()+1}/${now.getDate()}收`);
        // update DOM
        const pEl=document.getElementById(`price-${s.ticker}`);
        const cEl=document.getElementById(`chg-${s.ticker}`);
        if(pEl) pEl.textContent='$'+newPrice.toFixed(2);
        if(cEl){
          cEl.textContent=`${chgAbs>=0?'+':''}${chgAbs.toFixed(2)} (${chgPct>=0?'+':''}${chgPct.toFixed(2)}%)`;
          cEl.className='price-change '+(chgAbs>=0?'up':'dn');
        }
        const pos=w52pos(newPrice,s.week52Low,s.week52High);
        const posClr=pos<25?'var(--warn)':pos<60?'var(--accent2)':'var(--accent)';
        const fEl=document.getElementById(`w52fill-${s.ticker}`);
        const dEl=document.getElementById(`w52dot-${s.ticker}`);
        const pPos=document.getElementById(`w52pos-${s.ticker}`);
        const pCur=document.getElementById(`w52cur-${s.ticker}`);
        if(fEl){fEl.style.width=pos+'%';fEl.style.background=`linear-gradient(to right,#1e2530,${posClr})`;}
        if(dEl){dEl.style.left=pos+'%';dEl.style.background=posClr;}
        if(pPos){pPos.textContent=`位於 ${pos.toFixed(0)}%`;pPos.style.color=posClr;}
        if(pCur){pCur.textContent=`▲ $${newPrice.toFixed(2)}`;pCur.style.color=posClr;}
        const svgEl=document.getElementById(`spark-${s.ticker}`);
        if(svgEl) drawSparkline(svgEl,s.prices,s.dates,s.color);
      });
      const now=new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'});
      document.getElementById('last-updated').textContent='最後更新：'+now+' TWN';
      showToast('✓ 更新完成',false);
    } else {
      throw new Error('parse failed');
    }
  } catch(e){
    console.warn('API update failed:',e);
    showToast('⚠ 無法取得即時資料，請稍後再試',true);
  }
  btn.classList.remove('loading'); btn.textContent='⟳ 一鍵更新';
}

function showToast(msg,isErr){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(isErr?' error':'');
  setTimeout(()=>{t.className='toast';},3500);
}

initDashboard();
</script>
</body>
</html>
